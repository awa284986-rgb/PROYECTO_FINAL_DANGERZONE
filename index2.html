<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danger Zone</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Arial,sans-serif;
}


body{
    background:#e9edf3;
    height:100vh;
    width:100vw;
    overflow:hidden;
}




.phone{

    width:100vw;
    height:100vh;
    background:white;
    border-radius:0;
    border:none;
    overflow:hidden;
    position:relative;
    box-shadow:none;

}






.screen{

height:100vh;
width:100%;
padding:70px 80px 100px;
display:none;

}


.active{
display:block;
}




.logo{

width:130px;
height:130px;
border:4px solid #222;
border-radius:50%;
margin:60px auto;

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;
letter-spacing:5px;
color:#555;
text-align:center;

}



.input{

height:50px;
background:#eee;
border-radius:12px;
margin:20px 0;

}




.btn{

height:65px;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
letter-spacing:4px;
cursor:pointer;

}


.primary{

background:#333;
color:white;

}


.outline{

border:3px solid #333;
color:#777;
margin-top:20px;

}





.header{

display:flex;
justify-content:space-between;
align-items:center;
}


.circle{

width:70px;
height:70px;
border-radius:50%;
background:#ddd;

}


.map{

height:300px;
border:5px solid #333;
border-radius:18px;
margin-top:40px;

background:
linear-gradient(#ddd 2px,transparent 2px),
linear-gradient(90deg,#ddd 2px,transparent 2px);

background-size:50% 50%;
position:relative;

}


.location{

position:absolute;
right:20px;
bottom:20px;

}



.cards{

display:flex;
gap:15px;
margin-top:40px;

}


.card{

flex:1;
height:130px;
border:3px dashed #777;
display:flex;
align-items:center;
justify-content:center;
text-align:center;

}


.sos{

width:170px;
height:170px;
border-radius:50%;
border:8px solid #222;
margin:80px auto;

display:flex;
justify-content:center;
align-items:center;

font-size:35px;
font-weight:bold;

}


.action{

background:#eee;
padding:20px;
border-radius:15px;
margin:15px 0;

}





.contact{

background:#f0f0f0;
padding:20px;
border-radius:20px;
margin:15px 0;

display:flex;
justify-content:space-between;

}





.menu{

position:absolute;
bottom:0;
height:90px;
width:100%;
border-top:1px solid #bbb;

display:flex;
justify-content:space-around;
align-items:center;

background:white;

}


.menu button{

width:55px;
height:55px;
border-radius:15px;
border:0;
background:#ddd;

}


.menu .activebtn{

background:#333;

}


</style>

</head>


<body>


<div class="phone">





<section class="screen active" id="home">


<div class="logo">
DANGER<br>ZONE
</div>


<div class="input"></div>
<div class="input" style="width:70%;margin:auto"></div>


<div class="btn primary">
COMENZAR
</div>


<div class="btn outline">
YA TENGO CUENTA
</div>


</section>




<section class="screen" id="mapa">


<div class="header">

<div>
<h2>DANGER ZONE</h2>
<p>Protección activa</p>
</div>

<div class="circle"></div>

</div>



<div class="map">

<div class="location">
📍 Tu posición
</div>

</div>



<div class="cards">

<div class="card">
INCID.
</div>

<div class="card">
ZONA
</div>

<div class="card">
CONTAC.
</div>

</div>


</section>


<section class="screen" id="sos">


<h1 style="text-align:center">
EMERGENCIA
</h1>


<div class="sos">
SOS
</div>


<div class="action">
Mantén presionado 3 segundos
</div>


<div class="action">
📞 Llamar
</div>


<div class="action">
📍 Ubicar
</div>


<div class="action">
🔒 Bloquear
</div>


</section>




<section class="screen" id="contactos">


<h1>Contactos</h1>


<div class="contact">
Mamá
<button>☎</button>
</div>


<div class="contact">
Policía
<button>☎</button>
</div>


<div class="contact">
Emergencia
<button>☎</button>
</div>



</section>





<nav class="menu">

<button class="activebtn"
onclick="show('home')">
⌂
</button>


<button onclick="show('mapa')">
◎
</button>


<button onclick="show('sos')">
SOS
</button>


<button onclick="show('contactos')">
☰
</button>


</nav>



</div>



<script>


function show(page){

document.querySelectorAll('.screen')
.forEach(x=>x.classList.remove('active'));


document.getElementById(page)
.classList.add('active');

}


</script>



</body>
</html>
