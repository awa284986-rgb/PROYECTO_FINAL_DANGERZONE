</p>

<section class="contenido">



<div class="sos-card">



<div class="icono">

🚨

</div>



<h1>
¿Necesitas ayuda?
</h1>



<p>

Completa el reporte y enviaremos la información
a tus contactos de emergencia.

</p>




<div class="estado-sos">

🟢 GPS preparado  
<br>
📡 Sistema conectado

</div>



</div>







<div class="reporte-card">



<h2>
📝 Reportar incidente
</h2>



<form id="reporte">



<label>
Lugar del evento
</label>


<input 
type="text"
placeholder="Ejemplo: Av. Central">



<label>
Tipo de delito
</label>


<input 
type="text"
placeholder="Robo, accidente, peligro...">





<label>
Descripción
</label>


<textarea 
placeholder="Describe lo ocurrido">
</textarea>





<button class="btn">

Enviar reporte

</button>



</form>
